name: Daily News Email

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install requests
        run: pip install requests
        
      - name: Send daily news email
        run: python main.py
